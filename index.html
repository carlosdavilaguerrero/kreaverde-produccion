<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KreaVerde — Producción</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6f9;--card:#ffffff;--raised:#f0f3f7;--border:#dde3ec;--border2:#c5cfde;
  --green:#00923d;--amber:#b86e00;--red:#cc1f1f;--blue:#1a5fd4;--orange:#c45000;
  --txt:#0f1923;--txt2:#4a6180;--txt3:#92a6bf;
  --rajd:'Rajdhani',sans-serif;--mono:'Share Tech Mono',monospace;--sans:'Inter',sans-serif;
}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);font-size:14px;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#e8ecf2}
::-webkit-scrollbar-thumb{background:#b0bfce;border-radius:3px}

/* LAYOUT */
.app{display:flex;min-height:100vh}
.sidebar{width:230px;flex-shrink:0;background:#1a2535;border-right:1px solid #0f1923;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100}
.main{flex:1;margin-left:230px;min-height:100vh;overflow-x:hidden}
@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0;padding-bottom:70px}
  .ph{padding:16px 14px 12px}
  .content{padding:0 12px 80px}
  .fr{grid-template-columns:1fr!important}
  .info-grid{grid-template-columns:1fr!important}
  .stats{grid-template-columns:1fr 1fr!important}
  .grid4{grid-template-columns:1fr!important}
  th,td{padding:8px 8px!important;font-size:11px!important}
  .tw{font-size:11px}
  .ph-title{font-size:20px!important}
  .btn{font-size:12px;padding:8px 13px}
}

/* SIDEBAR */
.sb-logo{padding:22px 20px 16px;border-bottom:1px solid var(--border);font-family:var(--rajd);font-size:20px;font-weight:700;letter-spacing:2px;color:var(--green)}
.sb-logo small{color:#7a8fa8;font-weight:400;font-size:10px;display:block;letter-spacing:3px;margin-top:3px}
.sb-nav{flex:1;padding:10px 0;border-top:1px solid #253548}
.sb-item{display:flex;align-items:center;gap:10px;padding:12px 20px;font-family:var(--rajd);font-size:14px;font-weight:500;letter-spacing:.5px;color:#8fa8c2;cursor:pointer;transition:all .15s;border-left:3px solid transparent;user-select:none}
.sb-item:hover{color:#dde8f5;background:rgba(255,255,255,.06)}
.sb-item.active{color:#00e676;background:rgba(0,230,118,.1);border-left-color:#00e676}
.sb-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.sb-user{padding:16px;border-top:1px solid #253548}
.sb-user-name{font-family:var(--rajd);font-size:15px;font-weight:600;color:#dde8f5}
.sb-role{display:inline-block;margin-top:5px;padding:2px 9px;border-radius:3px;font-size:10px;letter-spacing:1.5px;font-weight:700;background:rgba(0,230,118,.15);color:#00e676}
.sb-logout{margin-top:11px;width:100%;padding:8px;background:rgba(255,61,61,.12);border:1px solid rgba(255,61,61,.3);color:#ff7070;border-radius:5px;cursor:pointer;font-size:12px;font-family:var(--rajd);letter-spacing:.5px;transition:all .15s}
.sb-logout:hover{background:rgba(255,61,61,.25)}

/* TOP BAR */
.topbar{background:#1a2535;display:flex;align-items:center;justify-content:space-between;padding:13px 16px;position:sticky;top:0;z-index:200}
.topbar-logo{font-family:var(--rajd);font-size:18px;font-weight:700;letter-spacing:2px;color:#00e676;line-height:1.1}
.topbar-logo small{display:block;font-size:9px;letter-spacing:3px;color:#7a8fa8;font-weight:400}
.topbar-user{display:flex;align-items:center;gap:8px}
.topbar-avatar{width:32px;height:32px;border-radius:50%;background:rgba(0,230,118,.15);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#00e676;font-family:var(--rajd)}

/* BOTTOM NAV */
.bottom-nav{background:#1a2535;display:flex;border-top:1px solid #253548;position:fixed;bottom:0;left:0;right:0;z-index:200}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px;cursor:pointer;transition:all .15s;user-select:none}
.bn-icon{font-size:18px;color:#8fa8c2}
.bn-lbl{font-size:9px;color:#8fa8c2;font-family:var(--rajd);letter-spacing:.3px}
.bn-item.active .bn-icon,.bn-item.active .bn-lbl{color:#00e676}

/* PAGE HEADER */
.ph{padding:26px 32px 18px;border-bottom:1px solid var(--border);margin-bottom:26px}
.ph-title{font-family:var(--rajd);font-size:27px;font-weight:700;letter-spacing:1px}
.ph-sub{font-size:12px;color:var(--txt2);margin-top:5px}
.content{padding:0 32px 60px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:22px;margin-bottom:18px}
.grid4{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:28px}
.mc{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .2s;cursor:pointer}
.mc:hover{border-color:var(--border2);box-shadow:0 2px 12px rgba(0,0,0,.08)}
.mc-h{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px}
.mc-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.mc-name{font-family:var(--rajd);font-size:15px;font-weight:600;letter-spacing:.5px;flex:1}
.mc-b{padding:15px 16px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:13px;margin-bottom:28px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:17px}
.stat-n{font-family:var(--mono);font-size:28px;color:var(--green)}
.stat-l{font-size:10px;color:var(--txt2);margin-top:5px;letter-spacing:1.5px;text-transform:uppercase;font-family:var(--rajd)}

/* PROGRESS */
.pbar{height:4px;background:#dde3ec;border-radius:2px;margin:10px 0;overflow:hidden}
.pfill{height:100%;border-radius:2px;transition:width .5s}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:3px;font-size:11px;font-weight:700;letter-spacing:.8px;font-family:var(--rajd)}
.badge::before{content:'●';font-size:7px}

/* TABLE */
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{border-bottom:1px solid var(--border2)}
th{padding:9px 12px;text-align:left;font-family:var(--rajd);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt2);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:rgba(26,95,212,.04)}
tr.clickable{cursor:pointer}

/* FORM */
.fg{display:flex;flex-direction:column;gap:16px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--txt2);text-transform:uppercase;font-family:var(--rajd)}
.field input,.field select,.field textarea{background:#f8fafc;border:1px solid var(--border2);border-radius:5px;padding:10px 13px;color:var(--txt);font-size:13px;font-family:var(--sans);outline:none;transition:border-color .15s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green)}
.field select option{background:#ffffff;color:#0f1923}
.field textarea{resize:vertical;min-height:80px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:6px;border:none;font-family:var(--rajd);font-size:14px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .15s;text-decoration:none}
.btn-primary{background:var(--green);color:#051409}
.btn-primary:hover{background:#00ff85}
.btn-secondary{background:#f0f3f8;border:1px solid var(--border2);color:var(--txt2)}
.btn-secondary:hover{border-color:var(--green);color:var(--txt);background:#e8f5ee}
.btn-danger{background:rgba(255,61,61,.1);border:1px solid rgba(255,61,61,.3);color:var(--red)}
.btn-danger:hover{background:rgba(255,61,61,.2)}
.btn-sm{padding:5px 13px;font-size:11px}
.btn-approve{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);color:var(--green)}
.btn-approve:hover{background:rgba(0,230,118,.2)}
.btn-warn{background:rgba(255,171,0,.1);border:1px solid rgba(255,171,0,.3);color:var(--amber)}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#edf0f5;background-image:radial-gradient(circle at 25% 50%,rgba(0,146,61,.06) 0%,transparent 50%),radial-gradient(circle at 75% 20%,rgba(26,95,212,.06) 0%,transparent 50%)}
.auth-box{width:390px;background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:38px 34px}
.auth-logo{font-family:var(--rajd);font-size:22px;font-weight:700;color:var(--green);margin-bottom:24px;letter-spacing:2px}
.auth-logo small{color:#6a8aaa;font-size:10px;font-weight:400;display:block;letter-spacing:3px;margin-top:3px}
.auth-title{font-family:var(--rajd);font-size:25px;font-weight:700;margin-bottom:5px}
.auth-sub{font-size:12px;color:var(--txt2);margin-bottom:28px}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:9px 14px;cursor:pointer;font-family:var(--rajd);font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border-bottom:2px solid transparent;color:var(--txt2);transition:all .15s;user-select:none;white-space:nowrap}
.tab:hover{color:var(--txt)}
.tab.active{color:var(--green);border-bottom-color:var(--green)}

/* MISC */
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.sp{flex:1}
.mono{font-family:var(--mono)}
.txt2{color:var(--txt2)}
.txt3{color:var(--txt3)}
.empty{text-align:center;padding:50px 20px;color:var(--txt2);font-family:var(--rajd);font-size:14px}
.err{color:var(--red);font-size:12px;margin-top:4px}
.lbl{font-size:10px;color:var(--txt2);letter-spacing:1.5px;text-transform:uppercase;font-family:var(--rajd)}
.st{font-family:var(--rajd);font-size:12px;font-weight:700;letter-spacing:2px;color:var(--txt2);margin-bottom:13px;text-transform:uppercase}
.divider{border:none;border-top:1px solid var(--border);margin:18px 0}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}

/* AUDIT */
.audit-e{padding:12px 15px;border-left:3px solid var(--border2);margin-bottom:8px;background:#f5f8fb;border-radius:0 6px 6px 0}
.audit-who{font-family:var(--rajd);font-size:13px;font-weight:700;color:var(--green)}
.audit-act{font-size:12px;color:var(--txt2);margin-top:3px}
.audit-time{font-size:11px;color:var(--txt3)}

/* NOTIF */
.notif{position:fixed;top:20px;right:20px;z-index:9999;padding:14px 22px;border-radius:8px;font-family:var(--rajd);font-size:14px;font-weight:700;border-left:4px solid;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:slideIn .3s ease;pointer-events:none}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
.notif-success{background:#e6f9ee;border-color:var(--green);color:#0f3d20}
.notif-error{background:#fdeaea;border-color:var(--red);color:#5c0f0f}

/* FILTER */
.fb{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.fb select,.fb input{background:#f8fafc;border:1px solid var(--border2);border-radius:5px;padding:8px 13px;color:var(--txt);font-size:12px;outline:none;font-family:var(--sans)}
.fb select:focus,.fb input:focus{border-color:var(--green)}

/* PULSE */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.pulse{animation:pulse 2s infinite}
@keyframes kvpulse{0%,100%{opacity:1}50%{opacity:.2}}

/* PENDING PAGE */
.pending-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#edf0f5}

/* TAG */
.tag{padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;font-family:var(--rajd);letter-spacing:1px}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.info-grid{grid-template-columns:1fr}.fr{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="app"></div>
<div id="notif"></div>

<script src="app.js" defer></script>
</body>
</html>
